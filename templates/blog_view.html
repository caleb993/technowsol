<!doctype html>
<html lang="en">

<head>

  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>{{ post.title }} • Muga Blog</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      background:
      radial-gradient(circle at top right, rgba(59,130,246,0.12), transparent 25%),
      radial-gradient(circle at bottom left, rgba(139,92,246,0.12), transparent 25%),
      #07111f;

      color:#f1f5f9;
      font-family:'Inter', sans-serif;
      overflow-x:hidden;
      min-height:100vh;
    }

    .floating-light{
      position:absolute;
      width:300px;
      height:300px;
      border-radius:50%;
      filter:blur(100px);
      z-index:-1;
    }

    .light1{
      background:rgba(59,130,246,0.12);
      top:-80px;
      right:-80px;
    }

    .light2{
      background:rgba(168,85,247,0.12);
      bottom:-100px;
      left:-100px;
    }

    .back-btn{
      display:inline-flex;
      align-items:center;
      gap:10px;

      text-decoration:none;
      padding:12px 20px;
      border-radius:16px;

      background:rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.08);

      color:#dbeafe;

      backdrop-filter:blur(12px);

      transition:.35s;
      margin-bottom:40px;
    }

    .back-btn:hover{
      transform:translateY(-3px);
      background:rgba(255,255,255,0.08);
      color:white;
      box-shadow:0 10px 30px rgba(0,0,0,0.25);
    }

    .blog-wrapper{
      max-width:900px;
      margin:auto;
    }

    .blog-hero{
      margin-bottom:40px;
    }

    .blog-badge{
      display:inline-block;
      padding:8px 18px;
      border-radius:999px;

      background:rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.08);

      color:#93c5fd;
      font-size:14px;
      letter-spacing:1px;

      margin-bottom:25px;
    }

    .blog-title{
      font-size:clamp(2.5rem, 7vw, 4.5rem);
      font-weight:800;
      line-height:1.1;

      font-family:'Space Grotesk', sans-serif;

      background:linear-gradient(to right,#ffffff,#60a5fa,#8b5cf6);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;

      margin-bottom:25px;
    }

    .blog-meta{
      display:flex;
      align-items:center;
      gap:12px;

      color:#94a3b8;
      font-size:15px;
    }

    .article-container{

      background:rgba(255,255,255,0.05);

      border:1px solid rgba(255,255,255,0.08);

      border-radius:30px;

      padding:45px;

      backdrop-filter:blur(18px);

      position:relative;

      overflow:hidden;

      box-shadow:
      0 20px 60px rgba(0,0,0,0.35);

    }

    .article-container::before{
      content:'';
      position:absolute;
      inset:0;

      background:
      linear-gradient(
      135deg,
      rgba(96,165,250,0.08),
      rgba(139,92,246,0.05),
      transparent
      );

      pointer-events:none;
    }

    .article-content{

      position:relative;
      z-index:2;

      font-size:1.08rem;
      line-height:2;

      color:#d6deea;

      white-space:pre-wrap;
    }

    .article-content p{
      margin-bottom:24px;
    }

    .reading-bar{
      width:120px;
      height:5px;

      border-radius:999px;

      background:
      linear-gradient(to right,#3b82f6,#8b5cf6);

      margin:35px 0;
    }

    .footer-note{
      text-align:center;
      margin-top:45px;
      color:#64748b;
      font-size:14px;
    }

    @media(max-width:768px){

      .article-container{
        padding:28px;
      }

      .blog-title{
        line-height:1.2;
      }

    }

  </style>

</head>

<body>

  <div class="floating-light light1"></div>
  <div class="floating-light light2"></div>

  <div class="container py-5">

    <div class="blog-wrapper">

      <!-- BACK BUTTON -->

      <a href="{{ url_for('blog_list') }}"
         class="back-btn">

        <i class="bi bi-arrow-left"></i>
        Back to Blog

      </a>

      <!-- HERO -->

      <div class="blog-hero">

        <div class="blog-badge">
          ✦ MUGA JOURNAL ARTICLE
        </div>

        <h1 class="blog-title">
          {{ post.title }}
        </h1>

        <div class="blog-meta">

          <i class="bi bi-calendar-event"></i>
          {{ post.timestamp }}

        </div>

      </div>

      <!-- ARTICLE -->

      <div class="article-container">

        <div class="reading-bar"></div>

        <div class="article-content">
          {{ post.content }}
        </div>

      </div>

      <div class="footer-note">
        Crafted with insight • Powered by Muga
      </div>

    </div>

  </div>

</body>
</html>
