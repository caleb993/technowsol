<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Page Not Found (404) • SurgeTechKnow</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body {
            background-color: #030712;
            color: #d1d5db;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .error-card {
            background: rgba(17, 24, 39, 0.7);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(59, 130, 246, 0.2);
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h1 {
            font-family: 'Space Grotesk', sans-serif;
            color: #3b82f6;
            font-weight: 700;
        }
        .btn-home {
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            border: none;
            color: white;
            padding: 10px 24px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            display: inline-block;
            transition: all 0.3s ease;
        }
        .btn-home:hover {
            transform: translateY(-2px);
            opacity: 0.95;
            color: white;
        }
    </style>
</head>
<body>
    <div class="error-card text-center">
        <div class="mb-4">
            <span class="display-1 text-primary">🕵️</span>
        </div>
        <h1 class="mb-3">404 - Page Not Found</h1>
        <p class="text-muted mb-4">The route or resource you are seeking does not exist or has been moved to another location.</p>
        <div class="mt-4">
            <a href="/" class="btn-home">Return to Safety</a>
        </div>
    </div>
</body>
</html>
