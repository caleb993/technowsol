  <title>🔐 Secure Login | TECHNOW.devRichtech</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@400;500;600;700;800;900&family=JetBrains+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #030712;
      --card-bg: #0b0f19;
      --brand-primary: #f97316;
      --brand-secondary: #ea580c;
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
      --border-color: rgba(249, 115, 22, 0.15);
    }
    
    body {
      background-color: var(--bg);
      color: var(--text-main);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* Ambient background blobs */
    .blob {
      position: absolute;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(249, 115, 22, 0.08) 0%, rgba(0,0,0,0) 70%);
      border-radius: 50%;
      z-index: -1;
      pointer-events: none;
    }
    .blob-1 { top: -100px; left: -100px; }
    .blob-2 { bottom: -100px; right: -100px; }

    .login-container {
      width: 100%;
      max-width: 440px;
      padding: 15px;
      z-index: 10;
    }

    .login-card {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      padding: 2.5rem;
      backdrop-filter: blur(20px);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6), 0 0 50px rgba(249, 115, 22, 0.04);
    }

    .brand-logo {
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      letter-spacing: -1px;
      font-size: 1.8rem;
    }

    .form-control-fire {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #fff !important;
      border-radius: 10px;
      padding: 0.85rem 1rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.1rem;
      letter-spacing: 2px;
      transition: all 0.3s ease;
    }

    .form-control-fire:focus {
      background: rgba(255, 255, 255, 0.05);
      border-color: var(--brand-primary);
      box-shadow: 0 0 15px rgba(249, 115, 22, 0.2);
    }

    .btn-fire {
      background: linear-gradient(135deg, var(--brand-primary) 0%, var(--brand-secondary) 100%);
      border: none;
      color: white;
      font-weight: 600;
      padding: 0.85rem;
      border-radius: 10px;
      transition: all 0.3s ease;
      font-family: 'Poppins', sans-serif;
      font-size: 1.05rem;
    }

    .btn-fire:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 20px rgba(249, 115, 22, 0.4);
    }

    .alert-fire {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.25);
      color: #f87171;
      border-radius: 10px;
      font-size: 0.9rem;
    }
  </style>
<meta name="robots" content="noindex, nofollow"><meta property="og:type" content="website"><meta property="og:site_name" content="SurgeTechKnow"><meta property="og:url" content="https://techknowsolution.co.ke{{ request.path }}"><meta property="og:title" content="🔐 Secure Login | TECHNOW.devRichtech"><meta property="og:description" content="SurgeTechKnow provides practical cybersecurity, networking, Windows News, AI automation and ICT support insights."><meta property="og:image" content="https://techknowsolution.co.ke/static/ogimage.png"><meta property="og:image:secure_url" content="https://techknowsolution.co.ke/static/ogimage.png"><meta property="og:image:width" content="1200"><meta property="og:image:height" content="630"><meta name="twitter:card" content="summary_large_image"><meta name="twitter:title" content="🔐 Secure Login | TECHNOW.devRichtech"><meta name="twitter:description" content="SurgeTechKnow provides practical cybersecurity, networking, Windows News, AI automation and ICT support insights."><meta name="twitter:image" content="https://techknowsolution.co.ke/static/ogimage.png"><meta name="theme-color" content="#e50920">
<meta property="og:image:type" content="image/png">
<meta property="og:locale" content="en_US">
<meta name="twitter:site" content="@SurgeTechKnow">
<meta name="twitter:creator" content="@SurgeTechKnow">

<script type="application/ld+json">{"@context":"https://schema.org","@type":"Organization","name":"SurgeTechKnow","url":"https://techknowsolution.co.ke","logo":"https://techknowsolution.co.ke/static/ogimage.png"}</script>
</head>
<body>

  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="login-container">
    <div class="text-center mb-4">
      <a href="/" class="text-decoration-none text-white brand-logo">
        MUGA <span class="text-warning">.dev</span>
      </a>
      <p class="text-muted small mt-1">COAP Access</p>
    </div>

    <div class="login-card">
      <div class="text-center mb-4">
        <div class="d-inline-flex p-3 rounded-circle mb-3" style="background: rgba(249, 115, 22, 0.05); border: 1px dashed rgba(249, 115, 22, 0.2);">
          <i class="bi bi-shield-lock-fill text-warning fs-3"></i>
        </div>
        <h3 class="fw-bold mb-1">Pass Code Verification</h3>
        <p class="text-muted small">Please input key privileges to unlock terminal individual dashboards.</p>
      </div>

      {% with messages = get_flashed_messages() %}
        {% if messages %}
          {% for msg in messages %}
            <div class="alert alert-fire d-flex align-items-center gap-2 mb-4" role="alert">
              <i class="bi bi-exclamation-triangle-fill"></i>
              <div>{{ msg }}</div>
            </div>
          {% endfor %}
        {% endif %}
      {% endwith %}

      <form method="POST" action="{{ url_for('login') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="mb-4">
          <label for="code" class="form-label text-muted small fw-semibold">WHAT'S YOUR PASS KEY</label>
          <input type="password" class="form-control form-control-fire text-center" id="code" name="code" required autocomplete="current-password" placeholder="••••••••" autofocus>
        </div>

        <button type="submit" class="btn btn-fire w-100 d-flex align-items-center justify-content-center gap-2">
          Verify Access Gate <i class="bi bi-arrow-right-short fs-5"></i>
        </button>
      </form>
    </div>

    <div class="text-center mt-4">
      <a href="/" class="text-muted text-decoration-none small hover-warning">
        <i class="bi bi-chevron-left"></i> Return to SurgeTechKnow Showcase
      </a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
