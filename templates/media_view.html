olumns:1fr}.main{padding:12px}.side{display:none}}@media(max-width:640px){:root{--wrap:calc(100% - 14px)}.media img,.media video{max-height:330px}}

/* =========================================================
   UNIVERSAL THUMBNAIL STANDARDIZATION PATCH
   Keeps every thumbnail/card image aligned, fast, and professional.
   Priority logic is handled by the existing blog_image filter:
   admin thumbnail -> first article image -> category fallback.
   ========================================================= */
img{max-width:100%;}
.story-img,.thumb,.blog-thumb,.article-thumb,.media-thumb,.featured-thumb{
  position:relative;
  overflow:hidden;
  background:#0b1220;
}
.story-img img,.story-img video,
.thumb img,.thumb video,
.blog-thumb img,.article-thumb img,.media-thumb img,.featured-thumb img,
.blog-thumb video,.article-thumb video,.media-thumb video,.featured-thumb video{
  width:100%!important;
  height:100%!important;
  object-fit:cover!important;
  object-position:center!important;
  display:block!important;
}
.card .story-img,.compact-card .story-img,.mini-story .story-img{
  aspect-ratio:16/9;
  height:auto!important;
}
.lead-story .story-img,.feature-green .story-img{
  aspect-ratio:21/11;
  height:auto!important;
}
.media-card .story-img,.media-card .thumb,.media-thumb{
  aspect-ratio:4/3;
  height:auto!important;
}
.overlay-card .story-img{
  height:100%!important;
  aspect-ratio:auto;
}
.rank-row img,.rel-row img,.rel img{
  width:96px!important;
  height:68px!important;
  object-fit:cover!important;
  border-radius:6px;
  background:#0b1220;
  flex:0 0 auto;
}
.hero-img,.blog-hero-image{
  width:100%!important;
  max-height:440px!important;
  aspect-ratio:16/7;
  object-fit:cover!important;
  object-position:center!important;
  border-radius:10px;
  background:#0b1220;
}
.content img,.article-content img{
  max-height:520px;
  object-fit:cover;
}
@media(max-width:640px){
  .lead-story .story-img,.feature-green .story-img{aspect-ratio:16/9;}
  .compact-card .story-img,.mini-story .story-img,.card .story-img{aspect-ratio:16/9;height:auto!important;}
  .media-card .story-img,.media-card .thumb,.media-thumb{aspect-ratio:4/3;height:auto!important;}
  .rank-row img,.rel-row img,.rel img{width:74px!important;height:52px!important;}
  .hero-img,.blog-hero-image{max-height:240px!important;aspect-ratio:16/9;}
}

/i><span>Home</span></a><a href="{{ url_for('blog_list') }}"><i class="bi bi-newspaper"></i><span>Journal</span></a><a href="{{ url_for('hub') }}"><i class="bi bi-tools"></i><span>Hub</span></a><a href="{{ url_for('media_gallery') }}"><i class="bi bi-images"></i><span>Media</span></a><a href="{{ url_for('index') }}#more"><i class="bi bi-list"></i><span>More</span></a></nav><script>
(function(){
  let start=Date.now(), maxScroll=0, interacted=false;
  function upd(){let h=document.documentElement.scrollHeight-innerHeight;if(h>0)maxScroll=Math.max(maxScroll,Math.round((scrollY/h)*100));}
  addEventListener('scroll',()=>{interacted=true;upd();},{passive:true});
  addEventListener('click',()=>{interacted=true;});
  addEventListener('touchstart',()=>{interacted=true;},{passive:true});
  function payload(){return {path:location.pathname,js_enabled:true,visible:document.visibilityState==='visible',time_on_page:Math.round((Date.now()-start)/1000),scroll_depth:maxScroll,engaged:true,interaction:interacted,screen_resolution:`${screen.width}x${screen.height}`,timezone:(Intl.DateTimeFormat().resolvedOptions().timeZone||'Unknown'),referrer:document.referrer,browser:navigator.userAgent,device_type:/Mobi|Android|iPhone|iPad/i.test(navigator.userAgent)?'Mobile':'Desktop'};}
  function send(){fetch('/api/track_visit',{method:'POST',headers:{'Content-Type':'application/json'},credentials:'same-origin',body:JSON.stringify(payload())}).catch(()=>{});}
  send(); setTimeout(send,5000); setInterval(send,30000);
  {% if post is defined and post.slug is defined %}
  function sendArticle(){fetch('/api/blog/heartbeat',{method:'POST',headers:{'Content-Type':'application/json'},credentials:'same-origin',body:JSON.stringify({slug:{{ post.slug|tojson }},total_seconds:Math.round((Date.now()-start)/1000),scroll_depth:maxScroll})}).catch(()=>{});}
  sendArticle(); setTimeout(sendArticle,8000); setInterval(sendArticle,30000);
  {% endif %}
})();
</script></body></html>
