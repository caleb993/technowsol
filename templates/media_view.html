<!doctype html><html lang="en" data-bs-theme="light"><head><script>(function(){const s=localStorage.getItem('theme')||'light';document.documentElement.setAttribute('data-bs-theme',s)})();</script><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"><title>{{ item.title }} • SurgeTechKnow Field Media Desk</title><meta name="description" content="{{ item.caption }}"><link rel="canonical" href="https://techknowsolution.co.ke{{ request.path }}"><meta name="robots" content="index, follow, max-image-preview:large"><meta name="google-adsense-account" content="ca-pub-4340479899629152"><meta name="google-site-verification" content="xN8zzUOK3ngMEFkP7XrSySJp_i9oCxQLBeWPBc0QHQE"><meta property="og:site_name" content="SurgeTechKnow"><meta property="og:title" content="{{ item.title }}"><meta property="og:description" content="{{ item.caption }}"><meta property="og:image" content="{{ item.url }}"><meta name="twitter:card" content="summary_large_image"><script async src="https://www.googletagmanager.com/gtag/js?id=G-ELRXZQRGNR"></script><script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments)}gtag('js',new Date());gtag('config','G-ELRXZQRGNR')</script><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Space+Grotesk:wght@500;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet"><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><style>:root{--bg:#f5f6fa;--surface:#fff;--surface2:#f1f3f7;--text:#111827;--muted:#667085;--line:#e5e7eb;--brand:#e50920}body{background:var(--bg);color:var(--text);font-family:Inter,sans-serif;overflow-x:hidden}.wrap{width:min(1080px,100%);margin:auto;padding:0 12px}.nav{position:sticky;top:0;z-index:20;background:rgba(255,255,255,.94);border-bottom:1px solid var(--line);backdrop-filter:blur(14px)}.navin{height:58px;display:flex;justify-content:space-between;align-items:center}.brand{text-decoration:none;color:var(--text);font:900 18px 'Space Grotesk'}.brand span{background:var(--brand);color:#fff;border-radius:10px;padding:8px;margin-right:8px}.cat{font:900 10px 'JetBrains Mono';color:var(--brand);text-transform:uppercase}.hero{padding:22px 0}.hero h1{font:900 clamp(2rem,5vw,4rem) 'Space Grotesk';letter-spacing:-.06em;line-height:1.02}.media-box{background:#111;border-radius:22px;overflow:hidden;border:1px solid var(--line)}.media-box img,.media-box video{width:100%;max-height:540px;object-fit:contain;display:block}.panel{background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:16px;margin-top:14px}.excerpt{color:var(--muted)}.related a{display:block;color:var(--text);text-decoration:none;border-bottom:1px solid var(--line);padding:8px 0;font-weight:850}footer{background:#030612;color:#d1d5db;margin-top:30px;padding:26px 0}footer a{color:#d1d5db;text-decoration:none;margin-right:14px;font-size:13px}@media(max-width:850px){.hero h1{font-size:2rem}.media-box img,.media-box video{max-height:360px}}</style></head><body><nav class="nav"><div class="wrap navin"><a class="brand" href="{{ url_for('index') }}"><span>STK</span>SurgeTechKnow</a><a class="cat text-decoration-none" href="{{ url_for('media_gallery') }}">Back to Field Media</a></div></nav><main class="wrap"><section class="hero"><span class="cat">Field Media Desk</span><h1>{{ item.title }}</h1><p class="excerpt">{{ item.caption }}</p></section><div class="media-box">{% if item.type == 'video' %}<video src="{{ item.url }}" controls playsinline></video>{% else %}<img src="{{ item.url }}" alt="{{ item.title }}">{% endif %}</div><section class="panel"><span class="cat">Full Narration</span><p class="mt-2">{{ item.narration }}</p></section><section class="panel related"><h3 class="font-display fw-bold">More content on technology</h3>{% for b in related_posts %}<a href="{{ url_for('view_blog', slug=b.slug) }}">{{ b.title }}</a>{% endfor %}</section></main><footer><div class="wrap"><strong>SurgeTechKnow</strong><div class="mt-2"><a href="{{ url_for('privacy_policy') }}">Privacy</a><a href="{{ url_for('terms') }}">Terms</a><a href="{{ url_for('contact_us_page') }}">Contact</a></div></div></footer></body></html>
