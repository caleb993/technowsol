<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>{{ item.title }} • Field Media Desk</title><meta name="description" content="{{ item.caption }}"><link rel="canonical" href="https://techknowsolution.co.ke{{ request.path }}"><meta property="og:title" content="{{ item.title }}"><meta property="og:image" content="{{ item.url }}"><meta name="robots" content="index, follow, max-image-preview:large"><meta name="google-adsense-account" content="ca-pub-4340479899629152"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&family=Space+Grotesk:wght@700;800&display=swap" rel="stylesheet"><style>:root{--red:#e50920;--ink:#071021;--muted:#647084;--line:#dfe3ea;--soft:#f4f6fa;--wrap:min(1380px,calc(100% - 30px))}body{margin:0;font-family:Inter,sans-serif;background:var(--soft);color:var(--ink);line-height:1.65}a{text-decoration:none;color:inherit}.wrap{width:var(--wrap);margin:auto}.top{background:var(--red);color:#fff;padding:10px 0;font-weight:900}.nav{background:#fff;border-bottom:1px solid var(--line)}.nav .wrap{height:60px;display:flex;align-items:center;justify-content:space-between}.brand{font:900 22px 'Space Grotesk'}.brand span{color:var(--red)}.layout{display:grid;grid-template-columns:1fr 360px;gap:22px;padding:25px 0}.main{background:#fff;border:1px solid var(--line);padding:18px}.main h1{font:900 clamp(28px,4vw,48px)/1.05 'Space Grotesk';margin:.2rem 0}.media{background:#050505;margin:16px 0}.media img,.media video{width:100%;max-height:560px;object-fit:contain;display:block}.side{background:#fff;border:1px solid var(--line);align-self:start}.side h3{background:#0f6b33;color:#fff;margin:0;padding:12px}.rel{display:grid;grid-template-columns:90px 1fr;gap:10px;padding:12px;border-bottom:1px solid var(--line)}.rel img{width:90px;height:62px;object-fit:cover}.rel h4{font:900 13px/1.2 'Space Grotesk';margin:0}@media(max-width:850px){.layout{grid-template-columns:1fr}.main{padding:12px}.side{display:none}}@media(max-width:640px){:root{--wrap:calc(100% - 14px)}.media img,.media video{max-height:330px}}</style></head><body><div class="top"><div class="wrap">SurgeTechKnow Field Media</div></div><nav class="nav"><div class="wrap"><a class="brand" href="{{ url_for('index') }}">Surge<span>TechKnow</span></a><a href="{{ url_for('media_gallery') }}">Back to media</a></div></nav><main class="wrap layout"><article class="main"><span style="color:var(--red);font-weight:900;text-transform:uppercase;font-size:11px">Field Media</span><h1>{{ item.title }}</h1><p style="color:var(--muted)">{{ item.caption }}</p><div class="media">{% if item.type=='video' %}<video src="{{ item.url }}" controls playsinline></video>{% else %}<img src="{{ item.url }}" alt="{{ item.title }}">{% endif %}</div><h2 style="font-family:Space Grotesk">Full field narration</h2><p>{{ item.narration }}</p></article><aside class="side"><h3>Related reads</h3>{% for b in related_posts[:6] %}<a class="rel" href="{{ url_for('view_blog', slug=b.slug) }}"><img src="{{ b|blog_image }}" onerror="this.src='/static/ogimage.png'" alt="{{ b.title }}"><h4>{{ b.title }}</h4></a>{% endfor %}</aside></main></body></html>
